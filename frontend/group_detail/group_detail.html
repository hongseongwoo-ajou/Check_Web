<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그룹 상세 - 체스 동아리</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="group_detail.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
</head>

<body>

    <header class="detail-header">
        <a href="../lobby/lobby.html" class="btn-back">&#8592; 로비로 돌아가기</a>
        <div class="header-logo">♟ Chess Club</div>
        <button id="btn-logout" class="btn-logout">로그아웃</button>
    </header>

    <main class="detail-main">
        <div class="detail-layout">

            <!-- ===== 메인 콘텐츠 ===== -->
            <div class="detail-content">

                <!-- 그룹 타이틀 + 초대코드 -->
                <div class="group-title-row">
                    <h1 class="page-title" id="group-name">-</h1>
                    <div class="title-actions">
                        <div class="invite-badge">
                            초대 코드: <code id="invite-code" class="invite-code">-</code>
                            <button id="btn-copy" class="btn-copy" title="복사">복사</button>
                        </div>
                        <button id="btn-leaderboard" class="btn-leaderboard">순위표 보기</button>
                    </div>
                </div>

                <!-- 진행 중인 투표 / 대진표 (JS로 동적 렌더링) -->
                <section id="poll-section" class="detail-card">
                    <p class="loading-msg" style="text-align:left">불러오는 중...</p>
                </section>

                <!-- 지난 경기 결과 -->
                <section class="detail-card">
                    <h2 class="card-heading">지난 경기 결과</h2>
                    <div id="match-history">
                        <p class="empty-msg-sm">아직 기록된 경기가 없습니다.</p>
                    </div>
                </section>

            </div>

            <!-- ===== 사이드바: 멤버 목록 ===== -->
            <aside class="detail-sidebar">
                <section class="detail-card">
                    <h2 class="card-heading">멤버 <span id="member-count" class="count-badge"></span></h2>
                    <ol id="member-list" class="member-list">
                        <li class="loading-msg">불러오는 중...</li>
                    </ol>
                </section>
            </aside>

        </div>
    </main>

    <!-- ===== 순위표 모달 ===== -->
    <div id="modal-leaderboard" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-backdrop"></div>
        <div class="modal-content modal-lg">

            <!-- 헤더 -->
            <div class="lb-modal-header">
                <h3 class="lb-modal-title">순위표</h3>
                <div class="lb-modal-actions">
                    <button id="btn-settings-toggle" class="btn-settings-toggle hidden">⚙ 승점 설정</button>
                    <button class="btn-modal-close btn-cancel" data-modal="modal-leaderboard">&#10005;</button>
                </div>
            </div>

            <!-- 승점 설정 패널 (방장/임원) -->
            <div id="lb-settings-panel" class="lb-settings-panel hidden">
                <div class="lb-settings-grid">
                    <div class="lb-settings-item">
                        <span class="lb-settings-label">승리</span>
                        <input type="number" id="input-pts-win" class="pts-input" min="0" max="99" value="3">
                        <span class="pts-unit">점</span>
                    </div>
                    <div class="lb-settings-item">
                        <span class="lb-settings-label">무승부</span>
                        <input type="number" id="input-pts-draw" class="pts-input" min="0" max="99" value="2">
                        <span class="pts-unit">점</span>
                    </div>
                    <div class="lb-settings-item">
                        <span class="lb-settings-label">패배</span>
                        <input type="number" id="input-pts-loss" class="pts-input" min="0" max="99" value="1">
                        <span class="pts-unit">점</span>
                    </div>
                </div>
                <div class="lb-settings-footer">
                    <p id="settings-msg" class="settings-msg"></p>
                    <button id="btn-save-pts" class="btn-save-pts">저장</button>
                </div>
            </div>

            <!-- 승점 규칙 + 테이블 -->
            <p id="pts-rule-label" class="pts-rule-label">승 3점 · 무 2점 · 패 1점</p>
            <div id="lb-content">
                <p class="loading-msg" style="text-align:center">불러오는 중...</p>
            </div>

        </div>
    </div>

    <!-- ===== 투표 생성 모달 ===== -->
    <div id="modal-create-poll" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h3 class="modal-title">매치 투표 생성</h3>
            <div class="form-group">
                <label for="input-poll-title">투표명</label>
                <input type="text" id="input-poll-title" class="form-input"
                       placeholder="예: 6월 5주차 정기전" maxlength="50">
            </div>
            <p id="create-poll-error" class="form-error"></p>
            <div class="modal-buttons">
                <button id="btn-confirm-create-poll" class="btn-primary">생성</button>
                <button class="btn-cancel" data-modal="modal-create-poll">취소</button>
            </div>
        </div>
    </div>

    <!-- ===== 경기 결과 기록 모달 ===== -->
    <div id="modal-result" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h3 class="modal-title">경기 결과 기록</h3>
            <p id="result-match-label" class="result-match-label">-</p>
            <div class="result-buttons">
                <button id="btn-p1-win" class="btn-result btn-result-win">-</button>
                <button id="btn-draw" class="btn-result btn-result-draw">무승부</button>
                <button id="btn-p2-win" class="btn-result btn-result-win">-</button>
            </div>
            <p id="result-error" class="form-error"></p>
            <div class="modal-buttons" style="margin-top:0.75rem">
                <button class="btn-cancel" data-modal="modal-result">취소</button>
            </div>
        </div>
    </div>

    <!-- ===== 기보 추가/수정 모달 ===== -->
    <div id="modal-pgn-edit" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h3 class="modal-title">기보 추가/수정</h3>
            <div class="form-group">
                <label for="input-pgn">PGN 기보</label>
                <textarea id="input-pgn" class="form-input pgn-textarea"
                          placeholder="[Event &quot;...&quot;]&#10;&#10;1. e4 e5 2. Nf3 Nc6 ..." rows="8"></textarea>
            </div>
            <p id="pgn-edit-error" class="form-error"></p>
            <div class="modal-buttons">
                <button id="btn-confirm-pgn" class="btn-primary">저장</button>
                <button class="btn-cancel" data-modal="modal-pgn-edit">취소</button>
            </div>
        </div>
    </div>

    <!-- ===== 기보 뷰어 모달 ===== -->
    <div id="modal-pgn-viewer" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-backdrop"></div>
        <div class="modal-content modal-lg modal-pgn-viewer">
            <div class="lb-modal-header">
                <h3 class="lb-modal-title" id="pgn-viewer-title">기보 재생</h3>
                <button class="btn-modal-close btn-cancel" data-modal="modal-pgn-viewer">&#10005;</button>
            </div>
            <div class="pgn-viewer-body">
                <div class="pgn-board-wrap">
                    <div id="pgn-board"></div>
                </div>
                <div class="pgn-controls">
                    <button id="pgn-btn-first" class="pgn-nav-btn" title="처음으로">&#8676;</button>
                    <button id="pgn-btn-prev"  class="pgn-nav-btn" title="이전">&#9664;</button>
                    <span id="pgn-move-counter" class="pgn-move-counter">0 / 0</span>
                    <button id="pgn-btn-next"  class="pgn-nav-btn" title="다음">&#9654;</button>
                    <button id="pgn-btn-last"  class="pgn-nav-btn" title="끝으로">&#8677;</button>
                    <span class="pgn-controls-divider"></span>
                    <button id="pgn-btn-flip"  class="pgn-nav-btn pgn-btn-flip" title="판 돌리기">&#8645;</button>
                </div>
                <div id="pgn-move-list" class="pgn-move-list"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="group_detail.js"></script>
</body>

</html>
