<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — 체스 동아리</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header>
        <a href="../index/index.html" class="back-link">← 홈으로</a>
        <h1>♟ 체스 동아리</h1>
    </header>

    <main>
        <div class="auth-card">
            <div class="tab-group">
                <button class="tab active" data-tab="login">로그인</button>
                <button class="tab" data-tab="register">회원가입</button>
            </div>

            <!-- 로그인 폼 -->
            <form id="login-form" class="auth-form">
                <div class="field">
                    <label for="login-username">아이디</label>
                    <input type="text" id="login-username" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="field">
                    <label for="login-password">비밀번호</label>
                    <input type="password" id="login-password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <p class="error-msg" id="login-error"></p>
                <button type="submit" class="btn-submit">로그인</button>
            </form>

            <!-- 회원가입 폼 -->
            <form id="register-form" class="auth-form hidden">
                <div class="field">
                    <label for="reg-username">아이디</label>
                    <input type="text" id="reg-username" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="field">
                    <label for="reg-nickname">이름</label>
                    <input type="text" id="reg-nickname" placeholder="이름을 입력하세요" required>
                </div>
                <div class="field">
                    <label for="reg-password">비밀번호</label>
                    <input type="password" id="reg-password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <p class="error-msg" id="register-error"></p>
                <p class="success-msg" id="register-success"></p>
                <button type="submit" class="btn-submit">회원가입</button>
            </form>
        </div>
    </main>

    <script src="login.js"></script>
</body>
</html>
