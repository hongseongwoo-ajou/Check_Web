services:
  - type: web
    name: chess-club
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DB_PATH
        value: chess_club.db
      - key: TURSO_DATABASE_URL
        value: libsql://chessclub-hongseongwoo-ajou.aws-ap-northeast-1.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false
